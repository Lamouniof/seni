<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une petite question...</title>
    <style>
        /* Des boutons plus grands, parfaits pour les pouces sur téléphone */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            width: 85%;
        }

        h1 {
            color: #ff477e;
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            touch-action: manipulation; /* Optimise le tactile */
        }

        #btn-oui {
            background-color: #ff477e;
            color: white;
        }

        #btn-non {
            background-color: #84a59d;
            color: white;
            position: absolute;
            transition: left 0.1s ease, top 0.1s ease;
        }

        .success-message {
            display: none;
        }

        .success-message h1 {
            color: #2a9d8f;
        }
        
        .success-message p {
            font-size: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="question-section">
            <h1>Veux-tu aller pendant ces vacances au cinéma, juste nous deux ?</h1>
            <div class="btn-container">
                <button id="btn-oui" onclick="validerOui()">Oui</button>
                <button id="btn-non">Non</button>
            </div>
        </div>

        <div id="success-section" class="success-message">
            <h1>Très bon choix ! 🎬</h1>
            <p>Quand es-tu libre ?</p>
        </div>
    </div>

    <script>
        const btnNon = document.getElementById('btn-non');
        const questionSection = document.getElementById('question-section');
        const successSection = document.getElementById('success-section');

        // Fonction magique pour mobile : s'active au premier contact du doigt (touchstart)
        function fuir(e) {
            // Empêche le clic normal de se déclencher immédiatement
            e.preventDefault(); 
            
            // On calcule des coordonnées aléatoires sur tout l'écran
            const x = Math.random() * (window.innerWidth - btnNon.offsetWidth - 20) + 10;
            const y = Math.random() * (window.innerHeight - btnNon.offsetHeight - 20) + 10;

            btnNon.style.position = 'fixed';
            btnNon.style.left = `${x}px`;
            btnNon.style.top = `${y}px`;
        }

        // On écoute le tactile ET la souris au cas où
        btnNon.addEventListener('touchstart', fuir);
        btnNon.addEventListener('mouseover', fuir);

        // Sécurité ultime : si la personne a des reflets de ninja et réussit à cliquer
        btnNon.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Erreur système : Bouton cassé. Redirection vers la seule option logique...");
            validerOui();
        });

        function validerOui() {
            questionSection.style.display = 'none';
            successSection.style.display = 'block';
            // On fait disparaître le bouton Non s'il flottait sur l'écran
            btnNon.style.display = 'none'; 
        }
    </script>

</body>
</html>
