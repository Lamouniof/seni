<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une petite question...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            width: 85%;
        }

        h1 {
            color: #ff477e;
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            touch-action: manipulation;
        }

        #btn-oui {
            background-color: #ff477e;
            color: white;
        }

        #btn-non {
            background-color: #84a59d;
            color: white;
            /* On le laisse en position normale au début */
            position: static; 
            transition: left 0.1s ease, top 0.1s ease;
        }

        .success-message {
            display: none;
        }

        .success-message h1 {
            color: #2a9d8f;
        }
        
        .success-message p {
            font-size: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="question-section">
            <h1>Veux-tu aller pendant ces vacances au cinéma, juste nous deux ?</h1>
            <div class="btn-container">
                <button id="btn-oui" onclick="validerOui()">Oui</button>
                <button id="btn-non">Non</button>
            </div>
        </div>

        <div id="success-section" class="success-message">
            <h1>Très bon choix ! 🎬</h1>
            <p>Quand es-tu libre ?</p>
        </div>
    </div>

    <script>
        const btnNon = document.getElementById('btn-non');
        const questionSection = document.getElementById('question-section');
        const successSection = document.getElementById('success-section');

        function fuir(e) {
            e.preventDefault(); 
            
            // Largeur et hauteur max pour pas que le bouton sorte de l'écran
            const maxX = window.innerWidth - btnNon.offsetWidth - 20;
            const maxY = window.innerHeight - btnNon.offsetHeight - 20;

            const x = Math.random() * maxX + 10;
            const y = Math.random() * maxY + 10;

            // C'est ici qu'on l'arrache de sa position de base pour le faire voler
            btnNon.style.position = 'fixed';
            btnNon.style.left = `${x}px`;
            btnNon.style.top = `${y}px`;
        }

        // Détection du toucher et de la souris
        btnNon.addEventListener('touchstart', fuir);
        btnNon.addEventListener('mouseover', fuir);

        // Sécurité anti-triche
        btnNon.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Erreur système : Bouton corrompu. Choix alternatif automatique...");
            validerOui();
        });

        function validerOui() {
            questionSection.style.display = 'none';
            successSection.style.display = 'block';
            btnNon.style.display = 'none'; 
        }
    </script>

</body>
</html>
